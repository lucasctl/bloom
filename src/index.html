<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6f4e37" />
    <title>Bloom</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="mx-auto max-w-xl p-4 pb-16">
      <header class="flex items-baseline justify-between py-6">
        <div>
          <h1 class="text-3xl font-bold">Bloom</h1>
          <p class="opacity-70 text-sm">4:6 pour-over calculator &amp; brew log</p>
        </div>
        <nav class="tabs tabs-box tabs-sm" data-tabs>
          <a href="#brew" class="tab">Brew</a>
          <a href="#history" class="tab">History</a>
        </nav>
      </header>
      <div id="view-brew">
        <section id="calculator"></section>
        <section id="log-form" hidden></section>
      </div>
      <div id="view-history" hidden>
        <section id="history"></section>
      </div>
    </main>
  </body>
</html>
